# Full Surprise val split, geo model + 3d_refer_geo (same scene set as bare full zeroshot).
#   CFG=lavis/projects/reason3d/val/reason3d_surprise_zeroshot_geo.yaml bash scripts/run_surprise_zeroshot_eval.sh

model:
  arch: reason3d_t5_geo
  model_type: pretrain_flant5xl
  reason3d_checkpoint: null
  use_grad_checkpoint: False
  mask_embedding: False
  geo_relational_cfg:
    knn_k: 16
    knn_chunk_size: 128
    use_checkpoint: true
    num_layers: 2
    hidden_dim: 128
    dropout: 0.0
  point_encoder_cfg:
    input_channel: 6
    media: 32
    normalize_before: True
    return_blocks: True
    fix_module: ["input_conv", "unet", "output_layer"]
    pretrained: "/nfs-stor/lan.wei/data/checkpoints/spf_scannet_512.pth"
  mask_decoder_cfg:
    media: 32
    num_layer: 6
    d_model: 256
    d_text: 512
    nhead: 8
    hidden_dim: 1024
    dropout: 0.0
    activation_fn: "gelu"
    attn_mask: True
  seg_criterion_cfg:
    loss_weight: [1.0, 1.0, 0.5, 5.0]
    loss_fun: "focal"
  pred_confidence: 0.5

datasets:
  3d_refer_geo:
    dataset_init:
      filter_missing_gt_in_pth: true
      pth_rel_subdir: "processed_surprise_full_pth"
    text_processor:
      train:
        name: "blip_question"
        prompt: ""
      eval:
        name: "blip_question"
    build_info:
      annotations:
        test:
          storage: /nfs-stor/lan.wei/data/annotations/surprise_val.json
      points:
        storage: /nfs-stor/lan.wei/data/scannetpp

run:
  task: 3d_refer_seg
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-8
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 1
  batch_size_eval: 1
  num_workers: 2
  accum_grad_iters: 1
  max_len: 60
  min_len: 1
  num_beams: 5
  inference_method: "generate"
  seed: 42
  output_dir: "output/reason3d_surprise_zeroshot_geo"
  save_eval_predictions: false
  save_eval_prediction_masks: false
  amp: True
  evaluate: True
  train_splits: []
  valid_splits: []
  test_splits: ["test"]
  use_dist_eval_sampler: false
  device: "cuda"
  gpu: 0
  world_size: 1
  distributed: false
  dist_url: "env://"
