# Eval smoke for reason3d_t5_geo + 3d_refer_geo.
#
# Same **scene set** as reason3d_surprise_zeroshot_small.yaml: test annotations are filtered to
# scene IDs in scripts/trial_scenes.txt only (3 scenes; see that file). All QA rows in
# surprise_val.json for those scenes are evaluated (no eval_max_samples; that only capped row count, not scenes).
#
#   python evaluate.py --cfg-path lavis/projects/reason3d/val/reason3d_surprise_zeroshot_small_geo.yaml \
#     --options model.reason3d_checkpoint=/path/to/weights.pth
#
# Geo stack must match the run that produced the checkpoint. Default run_surprise_finetune_geo.sh
# uses train/reason3d_surprise_finetune_geo.yaml; geo_relational_cfg below mirrors that file.
# For quick-train or custom overrides, pass matching --options model.geo_relational_cfg.*=...

model:
  arch: reason3d_t5_geo
  model_type: pretrain_flant5xl
  reason3d_checkpoint: null
  use_grad_checkpoint: False
  mask_embedding: False
  geo_relational_cfg:
    knn_k: 16
    knn_chunk_size: 128
    use_checkpoint: true
    num_layers: 2
    hidden_dim: 128
    dropout: 0.0
  point_encoder_cfg:
    input_channel: 6
    media: 32
    normalize_before: True
    return_blocks: True
    fix_module: ["input_conv", "unet", "output_layer"]
    pretrained: "/nfs-stor/lan.wei/data/checkpoints/spf_scannet_512.pth"
  mask_decoder_cfg:
    media: 32
    num_layer: 6
    d_model: 256
    d_text: 512
    nhead: 8
    hidden_dim: 1024
    dropout: 0.0
    activation_fn: "gelu"
    attn_mask: True
  seg_criterion_cfg:
    loss_weight: [1.0, 1.0, 0.5, 5.0]
    loss_fun: "focal"
  pred_confidence: 0.5

datasets:
  3d_refer_geo:
    dataset_init:
      filter_missing_gt_in_pth: true
      pth_rel_subdir: "processed_surprise_full_pth"
      # 3-scene small eval: must match non-geo reason3d_surprise_zeroshot_small.yaml
      eval_scene_allowlist_file: "scripts/trial_scenes.txt"
    text_processor:
      train:
        name: "blip_question"
        prompt: ""
      eval:
        name: "blip_question"
    build_info:
      annotations:
        test:
          storage: /nfs-stor/lan.wei/data/annotations/surprise_val.json
      points:
        storage: /nfs-stor/lan.wei/data/scannetpp

run:
  task: 3d_refer_seg
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-8
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 1
  batch_size_eval: 1
  num_workers: 2
  accum_grad_iters: 1
  max_len: 60
  min_len: 1
  num_beams: 5
  inference_method: "generate"
  seed: 42
  output_dir: "output/reason3d_surprise_zeroshot_small_geo"
  save_eval_predictions: true
  amp: True
  evaluate: True
  train_splits: []
  valid_splits: []
  test_splits: ["test"]
  use_dist_eval_sampler: false
  device: "cuda"
  gpu: 0
  world_size: 1
  distributed: false
  dist_url: "env://"
