# Quick geo finetune: small train subset + few epochs to get a checkpoint sooner.
# Same stack as reason3d_surprise_finetune_geo.yaml; override paths if needed.
#
#   REASON3D_INIT_CKPT=/path/to/reason3d.pth bash scripts/run_surprise_finetune_geo.sh
#   CFG=lavis/projects/reason3d/train/reason3d_surprise_finetune_geo_quick.yaml
#
# Or one-liner:
#   CFG=lavis/projects/reason3d/train/reason3d_surprise_finetune_geo_quick.yaml \
#     REASON3D_INIT_CKPT=/path/to/reason3d.pth bash scripts/run_surprise_finetune_geo.sh
#
# Tune subset size / epochs:
#   REASON3D_TRAIN_OPTIONS="datasets.3d_refer_geo.dataset_init.train_max_samples=256 datasets.3d_refer_geo.dataset_init.eval_max_samples=128 run.max_epoch=3"

model:
  arch: reason3d_t5_geo
  model_type: pretrain_flant5xl
  reason3d_checkpoint: null
  use_grad_checkpoint: False
  mask_embedding: False
  geo_relational_cfg:
    knn_k: 12
    knn_chunk_size: 256
    num_layers: 2
    hidden_dim: 96
    dropout: 0.0
  point_encoder_cfg:
    input_channel: 6
    media: 32
    normalize_before: True
    return_blocks: True
    fix_module: ["input_conv", "unet", "output_layer"]
    pretrained: "/nfs-stor/lan.wei/data/checkpoints/spf_scannet_512.pth"
  mask_decoder_cfg:
    media: 32
    num_layer: 6
    d_model: 256
    d_text: 512
    nhead: 8
    hidden_dim: 1024
    dropout: 0.0
    activation_fn: "gelu"
    attn_mask: True
  seg_criterion_cfg:
    loss_weight: [1.0, 1.0, 0.5, 5.0]
    loss_fun: "focal"
  pred_confidence: 0.5

datasets:
  3d_refer_geo:
    dataset_init:
      pth_rel_subdir: "processed_surprise_full_pth"
      filter_missing_gt_in_pth: true
      instance_id_cache_file: "/nfs-stor/lan.wei/data/scannetpp/processed_surprise_full_pth/.reason3d_instance_ids.json"
      instance_id_cache_write: false
      # First N rows after filters (JSON order); increase when you want full training / val / test.
      train_max_samples: 512
      # Val and test splits (non-train): same cap; see ThreeDReferDataset (eval_max_samples).
      eval_max_samples: 512
    text_processor:
      train:
        name: "blip_question"
        prompt: ""
      eval:
        name: "blip_question"
    build_info:
      annotations:
        train:
          storage: /nfs-stor/lan.wei/data/annotations/surprise_train.json
        val:
          storage: /nfs-stor/lan.wei/data/annotations/surprise_val.json
        test:
          storage: /nfs-stor/lan.wei/data/annotations/surprise_val.json
      points:
        storage: /nfs-stor/lan.wei/data/scannetpp

run:
  task: 3d_refer_seg
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-8
  warmup_steps: 500
  weight_decay: 0.05
  max_epoch: 2
  batch_size_train: 2
  batch_size_eval: 1
  num_workers: 4
  accum_grad_iters: 1
  max_len: 60
  min_len: 1
  num_beams: 5
  inference_method: "generate"
  seed: 42
  output_dir: "output/reason3d_surprise_finetune_geo_quick"
  amp: True
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: []
  device: "cuda"
  gpu: 0
  world_size: 1
  distributed: false
  dist_url: "env://"
