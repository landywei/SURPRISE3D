datasets:
  3d_refer:
    # data_dir: ${env.data_dir}/datasets
    data_type: [points] # [images|videos|features]
    # Optional kwargs forwarded to ThreeDReferDataset (see threedrefer_datasets.py).
    # train_max_samples: cap training JSON rows (first N after filters) for fast smoke / quick checkpoints.
    # eval_max_samples: same for val/test splits when not training.
    dataset_init:
      pth_rel_subdir: "processed_surprise_full_pth"

    build_info:
      # Be careful not to append minus sign (-) before split to avoid itemizing
      annotations:
      points:
          storage: /root/scannet++
